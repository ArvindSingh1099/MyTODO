<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Daily Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="dashboard">
        <header class="topbar">
          <div>
            <p class="eyebrow">Personal AI Daily Manager</p>
            <h1>Weekly Agenda</h1>
          </div>

          <div class="topbar-actions">
            <div class="week-nav" aria-label="Week navigation">
              <button id="prevWeekBtn" class="icon-btn compact" type="button" aria-label="Previous week" title="Previous week">
                &lt;
              </button>
              <button id="todayWeekBtn" type="button">Today</button>
              <button id="nextWeekBtn" class="icon-btn compact" type="button" aria-label="Next week" title="Next week">
                &gt;
              </button>
            </div>

            <div class="progress-block" aria-live="polite">
              <span id="progressText">0% complete</span>
              <div class="progress-track">
                <div id="progressFill" class="progress-fill"></div>
              </div>
            </div>

            <div class="filter-tabs" role="tablist" aria-label="Task filter">
              <button class="filter-btn active" data-filter="all" type="button">All</button>
              <button class="filter-btn" data-filter="pending" type="button">Pending</button>
              <button class="filter-btn" data-filter="done" type="button">Done</button>
            </div>

            <button
              id="sidebarToggle"
              class="icon-btn"
              type="button"
              aria-label="Toggle sidebar"
              title="Toggle sidebar"
            >
              <span></span>
              <span></span>
              <span></span>
            </button>
          </div>
        </header>

        <section id="weekBoard" class="week-board" aria-label="Current week task board"></section>
      </main>

      <aside id="sidebar" class="sidebar" aria-label="Task manager controls">
        <div class="sidebar-inner">
          <div class="sidebar-header">
            <div>
              <p class="eyebrow">Import and export</p>
              <h2>Manager</h2>
            </div>
            <button
              id="sidebarClose"
              class="icon-btn compact"
              type="button"
              aria-label="Close sidebar"
              title="Close sidebar"
            >
              x
            </button>
          </div>

          <label class="field-label" for="taskInput">Paste tasks</label>
          <textarea
            id="taskInput"
            class="input-area"
            spellcheck="false"
            placeholder='{"date":"2026-06-22","tasks":[{"category":"DSA","title":"Solve Two Sum","priority":"high","day":"2026-06-22"}]}'
          ></textarea>

          <div class="button-grid">
            <button id="loadJsonBtn" type="button">Load JSON</button>
            <button id="loadMarkdownBtn" type="button">Load Markdown</button>
            <button id="generateSummaryBtn" type="button">Generate Summary</button>
            <button id="copySummaryBtn" type="button">Copy Summary JSON</button>
            <button id="clearTodayBtn" type="button">Clear Current Day</button>
            <button id="themeToggleBtn" type="button">Toggle Theme</button>
            <button id="downloadJsonBtn" type="button">Download JSON</button>
            <button id="resetWeekBtn" class="danger" type="button">Reset Week</button>
          </div>

          <label class="field-label" for="summaryOutput">Summary JSON</label>
          <textarea id="summaryOutput" class="output-area" spellcheck="false"></textarea>

          <details class="history-panel" open>
            <summary>Task History</summary>
            <div id="historyList" class="history-list"></div>
          </details>
        </div>
      </aside>
    </div>

    <div id="noteModal" class="modal-backdrop" hidden>
      <section class="note-modal" role="dialog" aria-modal="true" aria-labelledby="noteTitle">
        <div class="modal-header">
          <div>
            <p id="noteCategory" class="eyebrow"></p>
            <h2 id="noteTitle">Task Note</h2>
          </div>
          <button id="closeNoteBtn" class="icon-btn compact" type="button" aria-label="Close note">x</button>
        </div>
        <textarea
          id="noteText"
          class="note-area"
          placeholder="What did you learn, complete, or get stuck on?"
        ></textarea>
        <div class="modal-actions">
          <button id="cancelNoteBtn" class="secondary" type="button">Cancel</button>
          <button id="saveNoteBtn" type="button">Save Note</button>
        </div>
      </section>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
