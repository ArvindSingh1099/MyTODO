<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova — Daily Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="aurora" aria-hidden="true">
      <span class="aurora-blob b1"></span>
      <span class="aurora-blob b2"></span>
      <span class="aurora-blob b3"></span>
    </div>

    <div class="app-shell">
      <main class="dashboard">
        <header class="topbar glass">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4z"/></svg>
            </div>
            <div>
              <p class="eyebrow">Nova · Daily Manager</p>
              <h1 id="weekTitle">Weekly Agenda</h1>
            </div>
          </div>

          <div class="topbar-actions">
            <div class="week-nav glass-inset" aria-label="Week navigation">
              <button id="prevWeekBtn" class="icon-btn" type="button" aria-label="Previous week" title="Previous week">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
              </button>
              <button id="todayWeekBtn" class="today-btn" type="button">Today</button>
              <button id="nextWeekBtn" class="icon-btn" type="button" aria-label="Next week" title="Next week">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
              </button>
            </div>

            <div class="filter-tabs glass-inset" role="tablist" aria-label="Task filter">
              <span class="filter-glider" aria-hidden="true"></span>
              <button class="filter-btn active" data-filter="all" type="button">All</button>
              <button class="filter-btn" data-filter="pending" type="button">Pending</button>
              <button class="filter-btn" data-filter="done" type="button">Done</button>
            </div>

            <div class="progress-ring-wrap" aria-live="polite" title="Weekly completion">
              <svg class="progress-ring" viewBox="0 0 44 44">
                <circle class="ring-track" cx="22" cy="22" r="18"></circle>
                <circle id="ringFill" class="ring-fill" cx="22" cy="22" r="18"></circle>
              </svg>
              <span id="progressText" class="ring-label">0%</span>
            </div>

            <button id="themeToggleBtn" class="icon-btn glass-inset" type="button" aria-label="Toggle theme" title="Toggle theme">
              <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 1 0 9 9 7 7 0 0 1-9-9z"/></svg>
              <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
            </button>

            <button id="sidebarToggle" class="icon-btn glass-inset menu-btn" type="button" aria-label="Toggle menu" title="Menu" aria-expanded="false">
              <span class="menu-line"></span>
              <span class="menu-line"></span>
              <span class="menu-line"></span>
            </button>
          </div>
        </header>

        <section class="quick-add glass">
          <svg class="quick-add-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          <input
            id="quickAddInput"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="Add a task for today…  (try “Read ML paper !high #Study”)"
            aria-label="Quick add task"
          />
          <kbd class="quick-add-kbd">↵</kbd>
        </section>

        <section id="weekBoard" class="week-board" aria-label="Current week task board"></section>
      </main>

      <aside id="sidebar" class="sidebar" aria-label="Menu" aria-hidden="true">
        <div class="sidebar-inner glass">
          <div class="sidebar-header">
            <div>
              <p class="eyebrow">Control Center</p>
              <h2>Menu</h2>
            </div>
            <button id="sidebarClose" class="icon-btn glass-inset" type="button" aria-label="Close menu" title="Close menu">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>

          <div class="menu-section" data-open="true">
            <button class="menu-section-head" type="button" aria-expanded="true">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 21h16"/></svg>
              <span>Import tasks</span>
              <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div class="menu-section-body">
              <label class="field-label" for="taskInput">Paste tasks JSON</label>
              <textarea
                id="taskInput"
                class="input-area"
                spellcheck="false"
                placeholder='{"date":"2026-07-03","tasks":[{"category":"DSA","title":"Solve Two Sum","priority":"high"}]}'
              ></textarea>
              <input id="jsonFileInput" type="file" accept="application/json,.json" hidden />
              <button id="loadJsonBtn" class="action-btn primary" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 21h16"/></svg>
                Load JSON <span class="hint">(empty → pick file)</span>
              </button>
            </div>
          </div>

          <div class="menu-section" data-open="true">
            <button class="menu-section-head" type="button" aria-expanded="true">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3h8l4 4v14H4V3h4zm0 11h8M8 18h5"/></svg>
              <span>Reports</span>
              <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div class="menu-section-body">
              <button id="generateSummaryBtn" class="action-btn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3h8l4 4v14H4V3h4zm0 11h8M8 18h5"/></svg>
                Generate summary JSON
              </button>
              <button id="downloadBtn" class="action-btn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 21h16"/></svg>
                Export month-wise JSON
              </button>
              <div id="historyList" class="history-list"></div>
            </div>
          </div>

          <div class="menu-section">
            <button class="menu-section-head" type="button" aria-expanded="false">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2m-9 4 1 10h8l1-10"/></svg>
              <span>Danger zone</span>
              <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div class="menu-section-body">
              <button id="clearDayBtn" class="action-btn danger" type="button">Clear today's tasks</button>
              <button id="resetWeekBtn" class="action-btn danger" type="button">Reset this week</button>
            </div>
          </div>
        </div>
      </aside>
      <div id="sidebarScrim" class="sidebar-scrim" hidden></div>
    </div>

    <div id="noteModal" class="modal-backdrop" hidden>
      <section class="note-modal glass" role="dialog" aria-modal="true" aria-labelledby="noteTitle">
        <div class="modal-header">
          <div>
            <p id="noteCategory" class="eyebrow"></p>
            <h2 id="noteTitle">Edit Task</h2>
          </div>
          <button id="closeNoteBtn" class="icon-btn glass-inset" type="button" aria-label="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <label class="field-label" for="editTaskTitle">Task</label>
        <input id="editTaskTitle" class="text-input" type="text" />
        <div class="edit-grid">
          <div>
            <label class="field-label" for="editTaskCategory">Category</label>
            <input id="editTaskCategory" class="text-input" type="text" />
          </div>
          <div>
            <label class="field-label" for="editTaskPriority">Priority</label>
            <select id="editTaskPriority" class="text-input">
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div>
            <label class="field-label" for="editTaskDay">Date</label>
            <input id="editTaskDay" class="text-input" type="date" />
          </div>
        </div>
        <label class="field-label" for="noteText">Note</label>
        <textarea
          id="noteText"
          class="note-area"
          placeholder="What did you learn, complete, or get stuck on?"
        ></textarea>
        <div class="modal-actions">
          <button id="deleteTaskBtn" class="action-btn danger" type="button">Delete</button>
          <span class="spacer"></span>
          <button id="cancelNoteBtn" class="action-btn" type="button">Cancel</button>
          <button id="saveNoteBtn" class="action-btn primary" type="button">Save</button>
        </div>
      </section>
    </div>

    <div id="toast" class="toast glass" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
